name: Sistema Actividades

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ejecutar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install gspread oauth2client pandas pywhatkit

      - name: Crear credenciales.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credenciales.json

      - name: Ejecutar sistema
        run: |
          python sistema_principal.py
